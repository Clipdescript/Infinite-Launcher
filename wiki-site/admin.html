<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Infinite Launcher</title>
    <link rel="icon" href="Infinite.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif, 'Noto Color Emoji', 'Apple Color Emoji', 'Segoe UI Emoji'; background: #f0f0f0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border: 2px solid #333; }
        h1 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; font-size: 14px; }
        textarea { min-height: 300px; font-family: monospace; }
        button { background: #333; color: white; padding: 15px 30px; border: none; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { background: #555; }
        .message { padding: 15px; margin-bottom: 20px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .help { color: #666; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Publier un article</h1>
        
        <div id="message" class="message"></div>
        
        <form id="form">
            <div class="form-group">
                <label>Titre</label>
                <input type="text" id="title" required placeholder="Ex: Minecraft 1.21.11 - Mounts of Mayhem">
            </div>
            
            <div class="form-group">
                <label>Date (optionnel)</label>
                <input type="text" id="date" placeholder="Ex: Date de sortie : 15 janvier 2026">
                <p class="help">Laissez vide pour la date du jour</p>
            </div>
            
            <div class="form-group">
                <label>Contenu HTML</label>
                <textarea id="content" required placeholder="<h4>Titre</h4>&#10;<p>Texte...</p>"></textarea>
                <p class="help">Utilisez &lt;h4&gt; pour les titres et &lt;p&gt; pour les paragraphes</p>
            </div>
            
            <button type="submit" id="btn">📤 Publier</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const app = initializeApp({
            apiKey: "AIzaSyBTTtTZgDUwT6McnVxCutv807_FpkZ37gE",
            authDomain: "projet-5774d.firebaseapp.com",
            projectId: "projet-5774d",
            storageBucket: "projet-5774d.firebasestorage.app",
            messagingSenderId: "863809073893",
            appId: "1:863809073893:web:65a723657b289d1ac6da0c"
        });

        const db = getFirestore(app);
        const form = document.getElementById('form');
        const btn = document.getElementById('btn');
        const msg = document.getElementById('message');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = '⏳ Publication...';
            msg.style.display = 'none';

            try {
                await addDoc(collection(db, 'articles'), {
                    title: document.getElementById('title').value,
                    date: document.getElementById('date').value || `Date de sortie : ${new Date().toLocaleDateString('fr-FR')}`,
                    content: document.getElementById('content').value,
                    createdAt: serverTimestamp()
                });

                msg.className = 'message success';
                msg.textContent = '✅ Article publié ! Il apparaît maintenant dans le launcher.';
                msg.style.display = 'block';
                form.reset();
                window.scrollTo(0, 0);
            } catch (error) {
                msg.className = 'message error';
                msg.textContent = '❌ Erreur : ' + error.message;
                msg.style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = '📤 Publier';
        };
    </script>
</body>
</html>
